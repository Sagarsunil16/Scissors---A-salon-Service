version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: scissors_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src/secureDocs:/app/src/secureDocs:ro
    environment:
      - NODE_ENV=production
      - MONGO=mongodb://mongo:27017/scissors
    command: npm start
    depends_on:
      - mongo

volumes:
  mongo_data:
